<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' href='css/style.css'>
</head>

<body>
    <!-- Dropdown -->

    <div class="container-fluid py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">CSI Thingymajig</h2>

            <button id="darkModeBtn" class="btn btn-outline-secondary">
                🌙 Dark Mode
            </button>
        </div>

        <!-- Dropdown Card -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <label class="form-label fw-bold">
                    Select Process
                </label>

                <select id="layoutSelector" class="form-select"></select>
            </div>
        </div>

        <!-- Layout Container -->
        <div class="card shadow-sm mb-3">
            <div class="card-header fw-bold">
                Dynamic Container
            </div>

            <div class="card-body">

                <!-- Cancellation Layout -->
                <div id="layoutCancellation" class="layout-panel">
                    
                    <div class="row mb-3">
                        <div class="col-12">
                            <select id="cancelTypeFilter" class="form-select mb-2">
                                <option value="All">All Products</option>
                            </select>

                            <input id="cancelSearch" class="form-control mb-3" type="text"
                                placeholder="Search by name or short name...">
                        </div>

                        <!-- Left List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cancel Plan(s)</label>

                            <div id="planListA" class="plan-list"></div>
                        </div>

                        <!-- Right List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Keep Plan(s)</label>

                            <div id="planListB" class="plan-list"></div>
                        </div>
                    </div>

                    <!-- Reason for Cancellation -->
                    <div class="row align-items-end mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Reason</label>

                            <select id="reasonDropdown" class="form-select">
                            </select>
                        </div>

                        <div class="col-md-4">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="withdrawalCheckbox">
                                <label class="form-check-label" for="withdrawalCheckbox">
                                    Withdrawal?
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Retention and Disclaimer -->
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Retention Script
                            </label>

                            <div id="retentionCancellation" class="script-box">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Disclaimer Script
                            </label>

                            <div id="disclaimerCancellation" class="script-box">
                            </div>
                        </div>
                    </div>


                    <!-- Cancellation Date -->

                    <div class="row mt-3">
                        <div class="col-md-4">
                            <label for="cancellationDate" class="form-label fw-bold">
                                Cancellation Date
                            </label>

                            <input type="date" id="cancellationDate" class="form-control">
                        </div>
                    </div>


                    <!-- CSI Documentation -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">CSI Documentation</label>
                        <textarea id="csiCancellation" class="form-control script-box-editable">
                        </textarea>
                    </div>

                    <!-- Clipboard and Reset Button -->
                    <div class="row mt-3 align-items-center">
                        <div class="col-4">
                            <!-- Empty middle column -->
                        </div>

                        <div class="col-4 text-center">
                            
                             <button id="copyCSIBtn" type="button" class="btn btn-outline-primary">
                                Copy to Clipboard
                            </button>
                        </div>

                        <div class="col-4 text-end">
                            <button id="clearPlansBtn" type="button" class="btn btn-outline-warning">
                                Reset
                            </button>
                        </div>
                    </div>

                </div>

                <!-- Renewal Layout -->
                <div id="layoutRemoveDependent" class="layout-panel" style="display:none;">
                    ...
                </div>

                <!-- Upgrade Layout -->
                <div id="layoutUpgrade" class="layout-panel" style="display:none;">
                    ...
                </div>
            </div>
        </div>

    </div>

    <script src="js/script.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/workflows/globals.js"></script>
    <script src="js/modules/helpers.js"></script>
    <script src="js/modules/planSelector.js"></script>
    <script src="js/workflows/cancellation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
