<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSI Thingymajig</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' href='css/style.css'>
</head>

<body>
    <!-- Dropdown -->

    <div class="container-md py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">CSI Thingymajig v1.0.1</h2>

            <button id="darkModeBtn" class="btn btn-outline-secondary">
                🌙 Dark Mode
            </button>
        </div>

        <!-- Dropdown Card -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <label class="form-label fw-bold">
                    Select Process
                </label>
                <select id="layoutSelector" class="form-select"></select>
            </div>
        </div>

        <!-- Layout Container -->
        <div class="card shadow-sm mb-3">

            <div class="card-body">

                <!-- Cancellation Layout -->
                <div id="layoutCancellation" class="layout-panel">

                    <div class="row mb-3">
                        <div class="col-12">
                            <select id="cancelTypeFilter" class="form-select mb-2">
                                <option value="All">All Products</option>
                            </select>

                            <input id="cancelSearch" class="form-control mb-3" type="text"
                                placeholder="Search by name or short name...">
                        </div>

                        <!-- Left List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cancel Plan(s)</label>

                            <div id="planListA" class="plan-list"></div>
                        </div>

                        <!-- Right List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Keep Plan(s)</label>

                            <div id="planListB" class="plan-list"></div>
                        </div>
                    </div>

                    <!-- Reason for Cancellation -->
                    <div class="row align-items-end mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Reason</label>

                            <select id="reasonDropdown" class="form-select">
                            </select>
                        </div>

                        <div class="col-md-4">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="withdrawalCheckbox">
                                <label class="form-check-label" for="withdrawalCheckbox">
                                    Withdrawal?
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Retention and Disclaimer -->
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Retention Script
                            </label>

                            <div id="retentionCancellation" class="script-box">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Disclaimer Script
                            </label>

                            <div id="disclaimerCancellation" class="script-box">
                            </div>
                        </div>
                    </div>


                    <!-- Cancellation Date -->

                    <div class="row mt-3">
                        <div class="col-md-4">
                            <label for="cancellationDate" class="form-label fw-bold">
                                Cancellation Date
                            </label>

                            <input type="date" id="cancellationDate" class="form-control">
                        </div>
                    </div>


                    <!-- CSI Documentation -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">CSI Documentation</label>
                        <textarea id="csiCancellation" class="form-control script-box-editable">
                        </textarea>
                    </div>

                    <!-- Clipboard and Reset Button -->
                    <div class="row mt-3 align-items-center">
                        <div class="col-4">
                            <!-- Empty middle column -->
                        </div>

                        <div class="col-4 text-center">

                            <button id="copyCSIBtn" type="button" class="btn btn-outline-primary">
                                Copy to Clipboard
                            </button>
                        </div>

                        <div class="col-4 text-end">
                            <button id="clearPlansBtn" type="button" class="btn btn-outline-warning">
                                Reset
                            </button>
                        </div>
                    </div>

                </div>

                <!-- Remove Dependent Layout -->
                <div id="layoutRemoveDependent" class="layout-panel">
                    <div class="row mb-3">
                        <div class="col-12">
                            <!-- Dependent Name -->
                            <label class="form-label fw-bold">Dependent Name</label>
                            <input id="dependentName" type="text" class="form-control">
                            <label class="form-label fw-bold">Dependent Relationship</label>
                            <!-- Dependent Relationship -->
                            <select id="cancelTypeFilter" class="form-select mb-2">
                                <option value="Husband">Husband</option>
                                <option value="Wife">Wife</option>
                                <option value="Son">Son</option>
                                <option value="Daughter">Daughter</option>
                                <option value="Other">Other</option>
                            </select>
                            <select id="cancelTypeFilter" class="form-select mb-2">
                                <option value="All">All Products</option>
                            </select>
                            <input id="cancelSearch" class="form-control mb-3" type="text"
                                placeholder="Search by name or short name...">
                        </div>

                        <!-- Left List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Plan(s) to Remove From</label>

                            <div id="planListA" class="plan-list"></div>
                        </div>

                        <!-- Right List -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Plan(s) to Keep</label>

                            <div id="planListB" class="plan-list"></div>
                        </div>
                    </div>

                    <!-- Reason for Removal -->
                    <div class="row align-items-end mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Reason</label>

                            <select id="reasonDropdown" class="form-select">
                            </select>
                        </div>

                        <div class="col-md-4">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="withdrawalCheckbox">
                                <label class="form-check-label" for="withdrawalCheckbox">
                                    Withdrawal?
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Retention and Disclaimer -->
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Retention Script
                            </label>

                            <div id="retentionCancellation" class="script-box">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Disclaimer Script
                            </label>

                            <div id="disclaimerCancellation" class="script-box">
                            </div>
                        </div>
                    </div>


                    <!-- Removal Date -->

                    <div class="row mt-3">
                        <div class="col-md-4">
                            <label for="cancellationDate" class="form-label fw-bold">
                                Removal Date
                            </label>
                            <input type="date" id="cancellationDate" class="form-control">
                        </div>
                    </div>


                    <!-- CSI Documentation -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">CSI Documentation</label>
                        <textarea id="csiCancellation" class="form-control script-box-editable">
                        </textarea>
                    </div>

                    <!-- Clipboard and Reset Button -->
                    <div class="row mt-3 align-items-center">
                        <div class="col-4">
                            <!-- Empty middle column -->
                        </div>

                        <div class="col-4 text-center">

                            <button id="copyCSIBtn" type="button" class="btn btn-outline-primary">
                                Copy to Clipboard
                            </button>
                        </div>

                        <div class="col-4 text-end">
                            <button id="clearPlansBtn" type="button" class="btn btn-outline-warning">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Refund Calculator Layout -->
                <div id="layoutRefundCalc" class="layout-panel">

                    <div class="card">
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">
                                        Monthly Premium
                                    </label>
                                    <input id="monthlyPremium" type="number" class="form-control" step="0.01">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">
                                        Premium / Day
                                    </label>
                                    <input id="premiumPerDay" type="text" class="form-control calculated-field"
                                        readonly>
                                </div>
                            </div>

                            <div class="row g-3 mt-2">
                                <div class="col-md-4">
                                    <label class="form-label">
                                        Day Of Cancellation
                                    </label>
                                    <input id="dayOfCancellation" type="number" class="form-control" min="1" max="31"
                                        step="1">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">
                                        Month Days
                                    </label>
                                    <input id="monthDays" type="number" class="form-control" min="28" max="31" step="1">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">
                                        Days Uncovered
                                    </label>
                                    <input id="daysUncovered" type="text" class="form-control calculated-field"
                                        readonly>
                                </div>
                            </div>

                            <div class="row g-3 mt-2">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">
                                        Prorated Amount
                                    </label>
                                    <input id="proratedAmount" type="text" class="form-control calculated-field"
                                        readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Billing & Payments -->
                <div id="layoutBillingPayments" class="layout-panel">

                    <div class="row g-4">
                        <!-- Left Card -->
                        <div class="col-lg-6">
                            <div class="card h-100">
                                <div class="card-header fw-bold">
                                    Request Information
                                </div>
                                <div class="card-body">
                                    <!-- Request Type -->
                                    <div class="mb-4">
                                        <label for="billingRequestType" class="form-label fw-bold">
                                            Request Type
                                        </label>
                                        <select id="billingRequestType" class="form-select">
                                            <option value="paymentOnly">
                                                Payment Only
                                            </option>

                                            <option value="oneTimePayment">
                                                One-Time Payment
                                            </option>

                                            <option value="updateCard">
                                                Update Debit / Credit Card
                                            </option>

                                            <option value="updateBank">
                                                Update Bank Account
                                            </option>

                                            <option value="paymentAndCard">
                                                Payment + Update Debit / Credit Card
                                            </option>

                                            <option value="paymentAndBank">
                                                Payment + Update Bank Account
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label id="memberNameLabel" class="form-label fw-bold">
                                            Cardholder Name
                                        </label>
                                        <input id="memberName" type="text" class="form-control">
                                    </div>

                                    <div id="paymentSection">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">
                                                Amount
                                            </label>
                                            <input id="paymentAmount" type="number" class="form-control" step="0.01">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">
                                                Phone Number
                                            </label>
                                            <input id="phoneNumber" type="text" class="form-control">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">
                                                Paid Through Date
                                            </label>
                                            <input id="paidThroughDate" type="date" class="form-control">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">
                                                Draft Date
                                            </label>
                                            <input id="draftDate" type="number" class="form-control" min="1" max="31">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Card -->
                        <div class="col-lg-6">
                            <div class="card h-100">
                                <div id="detailsCardHeader" class="card-header fw-bold">
                                    Payment Details
                                </div>
                                <div class="card-body">

                                    <!-- Payment Method -->
                                    <div id="paymentMethodContainer" class="mb-3">
                                        <label for="paymentMethod" class="form-label fw-bold">
                                            Payment Method
                                        </label>

                                        <select id="paymentMethod" class="form-select">
                                            <option value="card">
                                                Debit / Credit Card
                                            </option>
                                            <option value="bank">
                                                Bank Account
                                            </option>
                                        </select>
                                    </div>

                                    <!-- PAYMENT ONLY - CARD -->
                                    <div id="paymentCardSection">

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Payment ID
                                            </label>
                                            <input id="paymentCardId" type="text" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Billing ZIP
                                            </label>
                                            <input id="paymentCardZip" type="text" class="form-control">
                                        </div>

                                    </div>

                                    <!-- PAYMENT ONLY - BANK -->
                                    <div id="paymentBankSection" style="display:none;">

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Payment ID
                                            </label>
                                            <input id="paymentBankId" type="text" class="form-control">
                                        </div>

                                    </div>

                                    <!-- ONE TIME PAYMENT - CARD -->
                                    <div id="oneTimeCardSection" style="display:none;">

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Transaction Number
                                            </label>
                                            <input id="otpTransactionNumber" type="text" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Billing ZIP
                                            </label>
                                            <input id="otpBillingZip" type="text" class="form-control">
                                        </div>

                                    </div>

                                    <!-- ONE TIME PAYMENT / UPDATE BANK -->
                                    <div id="oneTimeBankSection" style="display:none;">

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Routing Number
                                            </label>
                                            <input id="routingNumber" type="text" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Bank Name
                                            </label>
                                            <input id="bankName" type="text" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Account Number
                                            </label>
                                            <input id="accountNumber" type="text" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">
                                                Account Type
                                            </label>

                                            <select id="accountType" class="form-select">
                                                <option value="CHKNG">
                                                    Checking
                                                </option>

                                                <option value="SAV">
                                                    Savings
                                                </option>
                                            </select>
                                        </div>

                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="row">
                        <div class="col-12">
                            <label class="form-label fw-bold">
                                CSI Documentation
                            </label>
                            <textarea id="csiBillingPayments" class="form-control" rows="10">
                            </textarea>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-6 text-end">
                            <button id="copyBillingBtn" type="button" class="btn btn-outline-primary">
                                Copy to Clipboard
                            </button>
                        </div>
                        <div class="col-6 text-end">
                            <button id="resetBillingBtn" type="button" class="btn btn-outline-warning">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Address Book Layout -->
                <div id="layoutAddressBook" class="layout-panel">
                    <div class="col-12">
                        <input id="contactSearch" class="form-control mb-3" type="text"
                            placeholder="Search by name or short name...">
                    </div>
                    <div id="categoriesContainer"></div>
                    <div id="copyToast" class="copy-toast">
                        Copied!
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="js/script.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/workflows/globals.js"></script>
    <script src="js/modules/helpers.js"></script>
    <script src="js/modules/planSelector.js"></script>
    <script src="js/workflows/cancellation.js"></script>
    <script src="js/workflows/refundCalculator.js"></script>
    <script src="js/workflows/billingPayments.js"></script>
    <script src="js/workflows/addressBook.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
